# fly.toml app configuration file generated for jobroom-ch on 2026-03-06T10:24:17Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jobroom-ch'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024


[mounts]
  source = "jobroom_data"
  destination = "/data"
